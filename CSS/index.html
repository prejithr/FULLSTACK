<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cascading style sheet</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        h1 {
            background-color: rgb(0, 237, 158);
        }
        p{
            color: blue;
            font-style: italic;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 800;
            font-size: large;
            text-decoration: underline;
            a{
                color:aquamarine;
                text-decoration: hotpink;

            }
        }
    </style>

</head>
<body>
    <h1 style="color: rgb(0, 86, 246);">HEADING</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Neque, consequuntur ea debitis ipsam facilis accusantium, esse est corporis laudantium aliquam eos quae velit voluptatum ipsum unde commodi officiis consequatur cupiditate?</p>
